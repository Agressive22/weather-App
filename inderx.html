<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="master.css">
</head>
<body style="background-color: #000000ed;">
    <div class="card">
        <div class="search">
            <input type="text" placeholder="City Name" id="search" autofocus>
            <button class="searchBtn">
             <img src="images/magnifying-glass.png">
            </button>
        </div>
        <div class="weather">
            <img src="images/cloudy.png" >
            <h1 class="temp">22°C</h1>
            <h2 class="name">Egypt</h2>
            <div class="details">
                 <div class="col">
                <img src="images/humidity.png" >
                <div class="text">
                      <h3 class="humidity">40%</h3>
                      <p>humidity</p>
                </div>
              
            </div>
            <div class="col">
                <img src="images/wind.png" >
                <div class="text">
                 <h3 class="wind">30 km/h</h1>
                <p>wind</p>
                </div>
            </div>
            </div>
           
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
